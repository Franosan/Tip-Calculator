<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main class="container">
      <h1 class="main-heading">Tip Calculator</h1>
      <p class="main-text">
        Enter the bill amount and tip percentage to calculate the total.
      </p>
      <p class="input-heading">Bill amount:</p>
      <input type="number" class="input-box input-bill" />
      <p class="input-heading">Tip percentage:</p>
      <input type="number" class="input-box input-tip" />
      <button class="btn-calculate">Calculate</button>
      <p class="total-heading">
        Total: <span class="total-amount hidden">13.44</span>
      </p>
    </main>
    <script src="script.js"></script>
  </body>
</html>
